name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - run: bun run generate
      - run: bun run build
      - run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN — auth via npm Trusted Publishing (OIDC).
        # npm CLI reads the GitHub Actions OIDC token (id-token: write above)
        # and exchanges it for a short-lived publish token. The package's
        # Trusted Publisher config on npmjs.com pins this exact workflow.
